<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>삼성전자 감사 페스티벌</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style type="text/css">
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f4f4ed; font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  img { display: block; max-width: 100%; }
  .new_evt_wrap { position: relative; width: 100%; margin: 0 auto; background: #f4f4ed; }
  .new_evt_wrap .event_detail { position: relative; }
  .new_evt_wrap .event_detail img { width: 100%; height: auto; }
  .buy_bar { display: flex; }
  .buy_bar button {
    height: 56px; width: 100%; background: #ff2e98; border: 0; cursor: pointer;
    color: #fff; font-family: Pretendard; font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
    transition: .15s;
  }
  .buy_bar button:hover { background: #fff; color: #ff2e98; outline: 2px solid #ff2e98; }
  .onnuri { position: relative; }
  .onnuri-cover { position: absolute; top: 0; left: 0; right: 0; height: 32%; background: #F2F2EB; }
  .onnuri-title { position: absolute; top: 9%; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .onnuri-title b { font-family: Pretendard; font-weight: 700; color: #2a2024; font-size: 26px; letter-spacing: -1px; line-height: 1; }
  .onnuri-title span { font-family: Pretendard; font-weight: 600; color: #2a2024; font-size: 14px; letter-spacing: -0.5px; }
</style>
</head>
<body>
<div class="new_evt_wrap">
  <!-- kv -->
  <div class="event_detail">
    <img alt="삼성전자 X LG유플러스 - 국민과 함께, 삼성전자 감사 페스티벌 2026.06.08~07.05" src="https://image.lguplus.com/static/mb-contents/images/fcmm/cnts/imge/20260608-085117-209-FrsxqydM.png" />
  </div>

  <!-- 휴대폰 구매하기 -->
  <div class="buy_bar">
    <button type="button" onclick="goBuy()">휴대폰 구매하기</button>
  </div>

  <!-- 디지털 온누리상품권 증정 -->
  <div class="event_detail">
    <img alt="삼성전자 감사 페스티벌 혜택 - 디지털 온누리상품권 증정" src="https://image.lguplus.com/static/mb-contents/images/fcmm/cnts/imge/20260612-010419-713-q7jZnvT2.png" />
  </div>
</div>

<script type="text/javascript">
  function goBuy() {
    try { window.parent.postMessage({ uplus: "goCarrier" }, "*"); } catch (e) {}
  }
</script>
</body>
</html>
